<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Navbar with Video Previews</title>
  <link href="https://fonts.googleapis.com/css2?family=Funnel+Display:wght@300..800&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: "Funnel Display", sans-serif;
      background: #f6f6f9;
    }

    /* Background video */
    .bg-video {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: -1;
    }

    /* Navbar */
    .navbar {
      background: rgba(75, 42, 173, 0.9);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 20px;
      color: #fff;
      position: relative;
      z-index: 10;
    }
    .navbar .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .navbar .logo img {
      width: 40px; height: 40px;
      border-radius: 6px;
    }
    .navbar .menu {
      display: flex;
      gap: 25px;
    }
    .navbar .menu a {
      text-decoration: none;
      color: #fff;
      padding: 5px 8px;
      font-size: 0.95rem;
      transition: all 0.3s ease;
    }
    .navbar .menu a:hover {
      color: #ffcc00;
      background: rgba(255,255,255,0.15);
      border-radius: 6px;
    }
    .navbar .menu:hover a:not(:hover) {
      filter: blur(2px) brightness(70%);
    }
    .navbar .right {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    .reward {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.9rem;
    }
    .reward img {
      width: 20px; height: 20px;
    }
    .profile img {
      width: 35px; height: 35px;
      border-radius: 50%;
      border: 2px solid #fff;
    }

    /* Video preview */
    .video-preview {
      position: absolute;
      top: 40px; left: 0;
      width: 200px; height: 120px;
      border-radius: 8px;
      overflow: hidden;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      background: #000;
      z-index: 20;
    }
    .video-preview video {
      width: 100%; height: 100%;
      object-fit: cover;
    }
    .navbar .menu a:hover .video-preview {
      opacity: 1;
    }

    /* Challenge styles */
    .yesno-title {
      text-align: center;
      font-size: 28px;
      margin: 20px;
      color: #fff;
      background: rgba(0, 0, 0, 0.7);
      padding: 10px;
      border-radius: 12px;
      display: inline-block;
    }
    .yesno-box {
      width: 70%;
      margin: 20px auto;
      padding: 25px;
      border-radius: 20px;
      background: rgba(0, 0, 0, 0.5);
      font-size: 22px;
      font-weight: bold;
      color: #fff;
      text-align: center;
    }
    .yesno-controls {
      margin: 20px auto;
      background: rgba(255,255,255,0.15);
      padding: 20px;
      border-radius: 15px;
      width: 80%;
      text-align: center;
    }
    .yesno-buttons button {
      margin: 8px;
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }
    #yesBtn { background: #4caf50; color: #fff; }
    #yesBtn:hover { background: #388e3c; }
    #noBtn { background: #f44336; color: #fff; }
    #noBtn:hover { background: #d32f2f; }
    #nextYesNo, #startYesNo { background: #2196f3; color: #fff; }
    #nextYesNo:hover, #startYesNo:hover { background: #1976d2; }

    .score-board {
      margin-top: 15px;
      font-size: 18px;
      font-weight: bold;
      color: #fff;
    }

    /* Notification */
    .notification {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #333;
      color: #fff;
      padding: 12px 18px;
      border-radius: 8px;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.4s ease;
      z-index: 100;
    }
    .notification.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* Confetti */
    .confetti {
      position: fixed;
      width: 8px; height: 8px;
      background: red;
      animation: fall 3s linear forwards;
      z-index: 200;
    }
    @keyframes fall {
      to {
        transform: translateY(100vh) rotate(720deg);
        opacity: 0;
      }
    }
  </style>
</head>
<body>

  <!-- Background video -->
  <video autoplay muted loop playsinline class="bg-video">
    <source src="mem.mp4" type="video/mp4">
    <source src="pix.webm" type="video/webm">
    <!-- fallback -->
  </video>

  <!-- Navbar -->
  <div class="navbar">
    <div class="logo">
      <img src="Screenshot 2025-09-14 134929.png" alt="Logo">
      <span>BrainBerry</span>
    </div>
    <div class="menu">
      <a href="front.html">Home
        <div class="video-preview"><video autoplay muted loop playsinline>
          <source src="pix.mp4" type="video/mp4">
        </video></div>
      </a>
      <a href="challen.html">Challenges
        <div class="video-preview"><video autoplay muted loop playsinline>
          <source src="pix12.mp4" type="video/mp4">
        </video></div>
      </a>
      <a href="chal.html">Games
        <div class="video-preview"><video autoplay muted loop playsinline>
          <source src="pix3.mp4" type="video/mp4">
        </video></div>
      </a>
      <a href="Less.html">Lessons
        <div class="video-preview"><video autoplay muted loop playsinline>
          <source src="pix5.mp4" type="video/mp4">
        </video></div>
      </a>
      <a href="rewards.html">Rewards
        <div class="video-preview"><video autoplay muted loop playsinline>
          <source src="rewards.mp4" type="video/mp4">
        </video></div>
      </a>
      <a href="help.html">Help
        <div class="video-preview"><video autoplay muted loop playsinline>
          <source src="help.mp4" type="video/mp4">
        </video></div>
      </a>
    </div>
    <div class="right">
      <div class="reward"><img src="https://cdn-icons-png.flaticon.com/512/616/616490.png"><span>0</span></div>
      <div class="reward"><img src="https://cdn-icons-png.flaticon.com/512/138/138281.png"><span>0</span></div>
      <div class="profile"><img src="dp-cactus-20.png"></div>
    </div>
  </div>

  <!-- Yes/No Challenge -->
  <section id="yesno-challenge">
    <h2 class="yesno-title">Challenge: Yes or No Questions</h2>
    <div class="yesno-box"><p id="yesnoSentence">Click "Start" to begin!</p></div>
    <div class="yesno-controls">
      <div class="yesno-buttons">
        <button id="yesBtn">✅ Yes</button>
        <button id="noBtn">❌ No</button>
        <button id="nextYesNo">➡ Next</button>
        <button id="startYesNo">▶ Start</button>
      </div>
      <div class="score-board">
        <p>Score: <span id="yesnoScore">0</span> / <span id="yesnoTotal">0</span></p>
        <p id="yesnoBadge"></p>
      </div>
    </div>
  </section>

  <!-- Notification -->
  <div id="yesnoNotification" class="notification">🎉 New Challenge Unlocked!</div>

<script>
const yesnoQuestions = [
  { text: "Don’t throw garbage on the road", answer: "Yes" },
  { text: "Use a dustbin", answer: "Yes" },
  { text: "Wash hands before eating", answer: "Yes" },
  { text: "Don’t spit in public", answer: "Yes" },
  { text: "Don’t play loud music in public places", answer: "Yes" },
  { text: "Respect queues", answer: "Yes" },
  { text: "Should we litter in the park?", answer: "No" },
  { text: "Should we respect elders?", answer: "Yes" }
];

let yesnoIndex = 0, yesnoScore = 0;
document.getElementById("yesnoTotal").innerText = yesnoQuestions.length;
const yesnoSentenceDisplay = document.getElementById("yesnoSentence");
const yesnoScoreDisplay = document.getElementById("yesnoScore");
const yesnoBadgeDisplay = document.getElementById("yesnoBadge");
const yesnoNotification = document.getElementById("yesnoNotification");

document.getElementById("startYesNo").addEventListener("click", () => {
  yesnoIndex = 0; yesnoScore = 0;
  yesnoScoreDisplay.innerText = 0;
  yesnoBadgeDisplay.innerText = "";
  loadYesNo();
});

function loadYesNo() {
  if (yesnoIndex < yesnoQuestions.length) {
    yesnoSentenceDisplay.innerText = yesnoQuestions[yesnoIndex].text;
  } else {
    yesnoSentenceDisplay.innerText = "🎉 Challenge Complete!";
    triggerYesNoCelebration();
  }
}

document.getElementById("yesBtn").addEventListener("click", () => checkYesNo("Yes"));
document.getElementById("noBtn").addEventListener("click", () => checkYesNo("No"));

function checkYesNo(answer) {
  if (yesnoIndex < yesnoQuestions.length) {
    if (answer === yesnoQuestions[yesnoIndex].answer) {
      yesnoScore++;
      yesnoScoreDisplay.innerText = yesnoScore;
      yesnoSentenceDisplay.innerText = "✅ Correct!";
    } else {
      yesnoSentenceDisplay.innerText = "❌ Wrong! Try Next.";
    }
  }
}

document.getElementById("nextYesNo").addEventListener("click", () => {
  yesnoIndex++;
  loadYesNo();
});

function triggerYesNoCelebration() {
  for (let i = 0; i < 100; i++) createConfetti();
  yesnoBadgeDisplay.innerText = "🏅 Yes/No Master Badge Unlocked!";
  yesnoNotification.classList.add("show");
  setTimeout(() => yesnoNotification.classList.remove("show"), 4000);
}

// Confetti generator
function createConfetti() {
  const confetti = document.createElement("div");
  confetti.className = "confetti";
  confetti.style.left = Math.random() * window.innerWidth + "px";
  confetti.style.top = "-10px";
  confetti.style.background = `hsl(${Math.random()*360}, 70%, 50%)`;
  document.body.appendChild(confetti);
  setTimeout(() => confetti.remove(), 3000);
}
</script>
</body>
</html>
