<!DOCTYPE html>
<html lang="en">
<head>
 <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fugaz+One&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Navbar with Video Previews</title>
  <style>
    body {
      margin: 0;
      font-family: "Fugaz one", sans-serif;
      background: #f6f6f9;
    }

    /* Background video */
    .bg-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
    }

    /* Navbar */
    .navbar {
      background: rgba(75, 42, 173, 0.9);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 20px;
      color: #fff;
      position: relative;
      z-index: 10;
    }

    /* Logo */
    .navbar .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .navbar .logo img {
      width: 80px;
      height: 55px;
      border-radius: 6px;
    }
    .navbar .logo span {
      font-size: 1.2rem;
      font-weight: bold;
    }

    /* Menu */
    .navbar .menu {
      display: flex;
      gap: 25px;
      position: relative;
    }
    .navbar .menu a {
      text-decoration: none;
      color: #fff;
      font-weight: 500;
      font-size: 0.95rem;
      padding: 5px 8px;
      position: relative;
      transition: all 0.3s ease;
    }

    .navbar .menu a:hover {
      color: #ffcc00;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 6px;
      filter: none !important;
    }

    /* Blur other options */
    .navbar .menu:hover a:not(:hover) {
      filter: blur(2px) brightness(70%);
    }

    /* Right side */
    .navbar .right {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    .reward {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.9rem;
    }
    .reward img {
      width: 20px;
      height: 20px;
    }
    .profile img {
      width: 70px;
      height: 55px;
      border-radius: 50%;
      border: 0px solid #fff;
    }
    
     /* Profile Sidebar */
    .profile-sidebar {
      position: fixed;
      top: 0;
      right: -320px;
      width: 300px;
      height: 100%;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-left: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: -2px 0 10px rgba(0,0,0,0.2);
      padding: 20px;
      transition: right 0.3s ease;
      z-index: 200;
      color: #fff;
    }
    .profile-sidebar.active {
      right: 0;
    }
    .profile-sidebar h2 {
      margin-top: 0;
      font-family: "Fugaz One", sans-serif;
    }
    .profile-sidebar p {
      margin: 10px 0;
      font-size: 1rem;
    }
    .profile-sidebar .close-btn {
      position: absolute;
      top: 10px;
      left: 10px;
      font-size: 20px;
      cursor: pointer;
    }

    /* Content */
    .content {
      padding: 40px;
      position: relative;
      z-index: 1;
      color: #fff;
      text-shadow: 0 2px 5px rgba(0,0,0,0.6);
      transition: filter 0.3s ease;
    }
    .menu:hover ~ .content {
      filter: blur(5px);
    }

    /* Video preview */
    .video-preview {
      position: absolute;
      top: 40px;
      left: 0;
      width: 200px;
      height: 120px;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      background: #000;
      z-index: 20;
    }
    .video-preview video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .navbar .menu a:hover .video-preview {
      opacity: 1;
    }

    /* Center translucent box */
 .center-box {
    position: absolute;
    top: 55%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 250px;
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(10px);
    padding: 30px 20px;
    border-radius: 15px;
    display: flex;
    flex-direction: column;  /* 👈 stack vertically */
    align-items: center;
    gap: 20px;
  }

  /* Inner small boxes */
  .inner-box {
    width: 100%;
    height: 80px;
    background: rgba(255, 255, 255, 0.25);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 1rem;
    font-weight: bold;
    text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    cursor: pointer;
    transition: transform 0.3s ease, background 0.3s ease;
  }
  .inner-box:hover {
    transform: scale(1.05);
    background: rgba(255, 255, 255, 0.35);
  }
  </style>
  
</head>
<body>

  <!-- Background video -->
  <video autoplay muted loop playsinline class="bg-video">
    <source src="summer-lake-forest-pixel-moewalls-com.mp4" type="video/mp4" />
  </video>

  <!-- Navbar -->
  <div class="navbar">
    <div class="logo">
      <img src="Screenshot 2025-09-14 134929.png" alt="Logo">
      <span>BrainBerry</span>
    </div>

    <div class="menu">
      <a href="front.html">
        Home
        <div class="video-preview">
          <video autoplay muted loop playsinline>
            <source src="pix.mp4" type="video/mp4">
          </video>
        </div>
      </a>
      <a href="challen.html">
        Challenges
        <div class="video-preview">
          <video autoplay muted loop playsinline>
            <source src="pix12.mp4" type="video/mp4">
          </video>
        </div>
      </a>
      <a href="chal.html">
        Games
        <div class="video-preview">
          <video autoplay muted loop playsinline>
            <source src="pix3.mp4" type="video/mp4">
          </video>
        </div>
      </a>
      <a href="Less.html">
        Lessons
        <div class="video-preview">
          <video autoplay muted loop playsinline>
            <source src="pix5.mov" type="video/mp4">
          </video>
        </div>
      </a>
      <a href="rewards.html">
        Rewards
        <div class="video-preview">
          <video autoplay muted loop playsinline>
            <source src="rewards.mp4" type="video/mp4">
          </video>
        </div>
      </a>
      <a href="help.html">
        Help
        <div class="video-preview">
          <video autoplay muted loop playsinline>
            <source src="help.mp4" type="video/mp4">
          </video>
        </div>
      </a>
    </div>

    <div class="right">
      <div class="reward">
        <img src="https://cdn-icons-png.flaticon.com/512/616/616490.png" alt="Gem">
        <span>0</span>
      </div>
      <div class="reward">
        <img src="https://cdn-icons-png.flaticon.com/512/138/138281.png" alt="Coin">
        <span>0</span>
      </div>
      <div class="profile">
        <img src="dp-cactus-20.png" alt="User">
      </div>
    </div>
  </div>
  <!-- Sidebar for Profile -->
<div id="profileSidebar" class="profile-sidebar">
  <span class="close-btn" onclick="toggleProfile()">X</span>
  <h2>User Profile</h2>
  <p><strong>Name:</strong> <span id="profileName"></span></p>
  <p><strong>Age:</strong> <span id="profileAge"></span></p>
  <p><strong>Email:</strong> <span id="profileEmail"></span></p>
</div>

    </div>
  </div>

  <!-- Center Translucent Box -->
  <div class="center-box">
    <div class="inner-box"onclick="location.href='alp.html'">Magic Of Words</div>
    <div class="inner-box"onclick="location.href='NunInd.html'">Numbers</div>
    <div class="inner-box"onclick="location.href='gsa.html'">Golden Words</div>
    <div class="inner-box"onclick="location.href='civicsense.html'">Civic Sense</div>
  </div>

</body>
<script>
   const leftBoxes = document.querySelectorAll(".left-container .glass-box");
    const infoContent = document.getElementById("info-content");
    let locked = false; // track click lock
 function toggleProfile() {
    document.getElementById("profileSidebar").classList.toggle("active");
  }

  // ✅ Make profile image open sidebar
  document.querySelector(".profile img").addEventListener("click", toggleProfile);
    leftBoxes.forEach(box => {
      // Show info on hover (only if not locked)
      box.addEventListener("mouseenter", () => {
        if (!locked) {
          infoContent.innerHTML = `<h2>${box.textContent}</h2><p>${box.dataset.info}</p>`;
        }
      });

      // Reset when mouse leaves (only if not locked)
      box.addEventListener("mouseleave", () => {
        if (!locked) {
          infoContent.innerHTML = `<h2>Hover or Click a Box</h2><p>The info will appear here.</p>`;
        }
      });

      // Lock info on click
      box.addEventListener("click", () => {
        locked = true;
        infoContent.innerHTML = `<h2>${box.textContent} (Locked)</h2><p>${box.dataset.info}</p>`;
      });
    });
  </script>
</html>
