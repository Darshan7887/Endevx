  <style>
    /* === Your entire CSS stays here === */
    body {
      margin: 0;
      font-family: "Fugaz one", sans-serif;
      background: #f6f6f9;
    }

    /* Background video */
    .bg-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
    }

    /* Navbar */
    .navbar {
 background: rgba(75, 42, 173, 0.9);
 backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 20px;
      color: #fff;
      position: relative;
      z-index: 10;
    }

    /* Logo */
    .navbar .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .navbar .logo img {
      width: 80px;
      height: 55px;
      border-radius: 6px;
    }
    .navbar .logo span {
      font-size: 1.2rem;
      font-weight: bold;
    }

    /* Menu */
    .navbar .menu {
      display: flex;
      gap: 25px;
      position: relative;
    }
    .navbar .menu a {
      text-decoration: none;
      color: #fff;
      font-weight: 500;
      font-size: 0.95rem;
      padding: 5px 8px;
      position: relative;
      transition: all 0.3s ease;
    }
    .navbar .menu a:hover {
      color: #ffcc00;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 6px;
      filter: none !important;
    }
    .navbar .menu:hover a:not(:hover) {
      filter: blur(2px) brightness(70%);
    }

    /* Right side */
    .navbar .right {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    .reward {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.9rem;
    }
    .reward img {
      width: 20px;
      height: 20px;
    }
    .profile img {
      width: 70px;
      height: 55px;
      border-radius: 100%;
      border: 0px solid #fff;
    }

    /* Profile Sidebar */
    .profile-sidebar {
      position: fixed;
      top: 0;
      right: -320px;
      width: 300px;
      height: 100%;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-left: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: -2px 0 10px rgba(0,0,0,0.2);
      padding: 20px;
      transition: right 0.3s ease;
      z-index: 200;
      color: #fff;
    }
    .profile-sidebar.active {
      right: 0;
    }
    .profile-sidebar h2 {
      margin-top: 0;
      font-family: "Fugaz One", sans-serif;
    }
    .profile-sidebar p {
      margin: 10px 0;
      font-size: 1rem;
    }
    .profile-sidebar .close-btn {
      position: absolute;
      top: 10px;
      left: 10px;
      font-size: 20px;
      cursor: pointer;
    }

    /* Content */
    .content {
      padding: 40px;
      position: relative;
      z-index: 1;
      color: #fff;
      text-shadow: 0 2px 5px rgba(0,0,0,0.6);
      transition: filter 0.3s ease;
    }
    .menu:hover ~ .content {
      filter: blur(5px);
    }

    /* Video preview */
    .video-preview {
      position: absolute;
      top: 40px;
      left: 0;
      width: 200px;
      height: 120px;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      background: #000;
      z-index: 20;
    }
    .video-preview video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .navbar .menu a:hover .video-preview {
      opacity: 1;
    }

    /* Glass boxes */
    .boxes-container {
      position: relative;
      width: 100%;
      height: 100vh;
      z-index: 10;
    }
    .glass-box {
      position: absolute;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 30px rgba(0,0,0,0.1);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: #000;
      font-weight: 500;
      text-align: center;
    }

    .box1 {
      width: 350px;
      height: 400px;
      top: 20%;
      left: 2%;
    }
    .character-stats {
      margin-top: 10px;
      color: white;
      font-size: 14px;
      text-align: center;
    }
    .exp-bar {
      width: 90%;
      height: 12px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      margin: 6px auto;
      overflow: hidden;
    }
    .exp-fill {
      height: 100%;
      background: linear-gradient(90deg, #00ffcc, #0077ff);
      border-radius: 8px;
      transition: width 0.5s ease;
    }

    .box2 {
      width: 500px;
      height: 450px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      overflow-y: auto;
      top: 20%;
      left: 31%;
    }
    .box2 h2 {
      font-family: "Funnel Display", sans-serif;
    }

    /* Box 3 To-Do List */
    .box3 {
      width: 350px;
      height: 400px;
      top: 20%;
      right: 5%;
      padding: 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .todo-container {
      width: 100%;
      text-align: center;
    }
    #todo-input {
      width: 70%;
      padding: 8px;
      border-radius: 8px;
      border: 2px solid #6a5acd;
      font-size: 16px;
    }
    .todo-container button {
      padding: 8px 12px;
      margin-left: 5px;
      border: none;
      border-radius: 8px;
      background: #6a5acd;
      color: white;
      cursor: pointer;
      font-size: 16px;
    }
    .todo-container button:hover {
      background: #483d8b;
    }
    #todo-list {
      list-style-type: none;
      padding: 0;
      margin-top: 15px;
      text-align: left;
    }
    #todo-list li {
      padding: 8px;
      margin: 5px 0;
      background: #e0e7ff;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 16px;
    }
    #todo-list li.completed {

    }

    /* Lesson boxes inside middle */
    .lesson-box {

      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      transition: all 0.3s ease;
      cursor: pointer;
      font-weight: bold;
    }
    .lesson-box h2 {
      font-family: "Funnel Display", sans-serif;

    .lesson-box:hover {
      background: rgba(255, 255, 255, 0.4);
      box-shadow: 0 0 15px rgba(255, 200, 0, 0.8);
      transform: scale(1.05);
    }
  </style>

<!-- ✅ Firebase To-Do Script -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
  import { 
    getFirestore, doc, getDoc, setDoc 
  } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

  // ✅ Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyADRJMnuBGNzU_LAOx0bYSg0UvCEXEC7vs",
    authDomain: "brainberry-96454.firebaseapp.com",
    projectId: "brainberry-96454",
    storageBucket: "brainberry-96454.appspot.com",
    messagingSenderId: "819230645241",
    appId: "1:819230645241:web:698aa272865737ee103b28",
    measurementId: "G-VVHB92VP3H"
  };

  // ✅ Init
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  window.db = db; // expose globally

  // ✅ Save todos
  async function saveTodosToFirestore() {
    const email = localStorage.getItem("userEmail");
    if (!email) return;

    const todos = [];
    document.querySelectorAll("#todo-list li span").forEach(span => {
      todos.push(span.textContent.trim());
    });

    try {
      await setDoc(doc(db, "todos", email), { tasks: todos });
      console.log("✅ Saved todos:", todos);
    } catch (err) {
      console.error("❌ Error saving todos:", err);
    }
  }

  // ✅ Load todos
  async function loadTodosFromFirestore() {
    const email = localStorage.getItem("userEmail");
    if (!email) return;

    try {
      const docRef = doc(db, "todos", email);
      const docSnap = await getDoc(docRef);

      const list = document.getElementById("todo-list");
      list.innerHTML = "";

      if (docSnap.exists()) {
        const { tasks } = docSnap.data();
        tasks.forEach(taskText => createTodoItem(taskText));
      }
    } catch (err) {
      console.error("❌ Error loading todos:", err);
    }
  }

  // ✅ Create task item
  function createTodoItem(taskText) {
    const li = document.createElement("li");

    const span = document.createElement("span");
    span.textContent = taskText;
    li.appendChild(span);

    const delBtn = document.createElement("button");
    delBtn.textContent = "X";
    delBtn.style.marginLeft = "10px";
    delBtn.style.background = "transparent";
    delBtn.style.border = "none";
    delBtn.style.color = "red";
    delBtn.style.fontWeight = "bold";
    delBtn.style.cursor = "pointer";

    delBtn.onclick = async () => {
      li.remove();
      await saveTodosToFirestore();
    };

    li.appendChild(delBtn);
    document.getElementById("todo-list").appendChild(li);
  }

  // ✅ Add task
  window.addTask = async function () {
    const input = document.getElementById("todo-input");
    const taskText = input.value.trim();
    if (!taskText) return;

    createTodoItem(taskText);
    input.value = "";
    await saveTodosToFirestore();
  };

  // ✅ Load on page load
  document.addEventListener("DOMContentLoaded", () => {
    loadTodosFromFirestore();
  });

  // expose functions globally
 window.loadTodosFromFirestore = loadTodosFromFirestore;
window.saveTodosToFirestore = saveTodosToFirestore;

function loadUserProfile() {
  const name = localStorage.getItem("userName") || "Unknown";
  const age = localStorage.getItem("userAge") || "-";
  const email = localStorage.getItem("userEmail") || "Not logged in";

  document.getElementById("profileName").textContent = name;
  document.getElementById("profileAge").textContent = age;
  document.getElementById("profileEmail").textContent = email;
}


// ✅ Run when page loads
document.addEventListener("DOMContentLoaded", () => {
  loadUserProfile();
});

</script>
