<link href="https://fonts.googleapis.com/css2?family=Fugaz+One&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Navbar with Video Previews</title>
  <style>
    body {
      margin: 0;
      font-family: "Fugaz one", sans-serif;
      background: #f6f6f9;
    }

    /* Background video */
    .bg-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
    }

    /* Navbar */
    .navbar {
      background: rgba(75, 42, 173, 0.9);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 20px;
      color: #fff;
      position: relative;
      z-index: 10;
    }

    /* Logo */
    .navbar .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .navbar .logo img {
      width: 80px;
      height: 55px;
      border-radius: 6px;
    }
    .navbar .logo span {
      font-size: 1.2rem;
      font-weight: bold;
    }

    /* Menu */
    .navbar .menu {
      display: flex;
      gap: 25px;
      position: relative;
    }
    .navbar .menu a {
      text-decoration: none;
      color: #fff;
      font-weight: 500;
      font-size: 0.95rem;
      padding: 5px 8px;
      position: relative;
      transition: all 0.3s ease;
    }

    .navbar .menu a:hover {
      color: #ffcc00;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 6px;
      filter: none !important;
    }

    /* Blur other options */
    .navbar .menu:hover a:not(:hover) {
      filter: blur(2px) brightness(70%);
    }

    /* Right side */
    .navbar .right {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    .reward {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.9rem;
    }
    .reward img {
      width: 20px;
      height: 20px;
    }
    .profile img {
      width: 70px;
      height: 55px;
      border-radius: 50%;
      border: 0px solid #fff;
    }

    /* Content */
    .content {
      padding: 40px;
      position: relative;
      z-index: 1;
      color: #fff;
      text-shadow: 0 2px 5px rgba(0,0,0,0.6);
      transition: filter 0.3s ease;
    }
    .menu:hover ~ .content {
      filter: blur(5px);
    }

    /* Video preview */
    .video-preview {
      position: absolute;
      top: 40px;
      left: 0;
      width: 200px;
      height: 120px;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      background: #000;
      z-index: 20;
    }
    .video-preview video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .navbar .menu a:hover .video-preview {
      opacity: 1;
    }
.game-box {
  margin: 40px auto;
  width: 90%;
  max-width: 700px;
  background: rgba(255, 255, 255, 0.15);
  padding: 30px;
  border-radius: 16px;
  color: #fff;
  text-align: center;
  backdrop-filter: blur(12px);
  box-shadow: 0 8px 20px rgba(0,0,0,0.4);
}

#simon-board {
  display: grid;
  grid-template-columns: repeat(2, 150px);
  grid-template-rows: repeat(2, 150px);
  gap: 20px;
  justify-content: center;
  margin: 30px auto;
}

.color-btn {
  width: 150px;
  height: 150px;
  border-radius: 16px;
  cursor: pointer;
  opacity: 0.85;
  transition: opacity 0.2s, transform 0.2s;
}

.color-btn.green { background: #28a745; }
.color-btn.red { background: #dc3545; }
.color-btn.yellow { background: #ffc107; }
.color-btn.blue { background: #007bff; }

.color-btn.active {
  opacity: 1;
  transform: scale(1.05);
}

  </style>

<div class="game-box">
  <h1>🎵 Simon Says 🎵</h1>
  <p>Watch the sequence and repeat it by clicking the colors in the same order!</p>

  <div id="simon-board">
    <div class="color-btn green" data-color="green"></div>
    <div class="color-btn red" data-color="red"></div>
    <div class="color-btn yellow" data-color="yellow"></div>
    <div class="color-btn blue" data-color="blue"></div>
  </div>

  <p id="status">Press Start to play!</p>
  <button id="start-btn">▶ Start</button>
</div>
<script>
  const colors = ["green", "red", "yellow", "blue"];
  let sequence = [];
  let playerSequence = [];
  let level = 0;

  const statusText = document.getElementById("status");
  const startBtn = document.getElementById("start-btn");
  const buttons = document.querySelectorAll(".color-btn");

  // Speak helper
  function speak(text) {
    const utterance = new SpeechSynthesisUtterance("Simon says " + text);
    utterance.rate = 1;   // speed
    utterance.pitch = 1;  // tone
    speechSynthesis.speak(utterance);
  }

  // Flash a button + say color
  function flash(color) {
    const btn = document.querySelector(`.color-btn.${color}`);
    btn.classList.add("active");
    setTimeout(() => btn.classList.remove("active"), 500);
    speak(color); // 🔊 Voice
  }

  // Play full sequence
  function playSequence() {
    let i = 0;
    const interval = setInterval(() => {
      flash(sequence[i]);
      i++;
      if (i >= sequence.length) {
        clearInterval(interval);
      }
    }, 1000);
  }

  // Start game
  function startGame() {
    sequence = [];
    playerSequence = [];
    level = 0;
    nextRound();
  }

  // Next round
  function nextRound() {
    level++;
    statusText.textContent = `Level ${level}`;
    playerSequence = [];
    sequence.push(colors[Math.floor(Math.random() * 4)]);
    setTimeout(playSequence, 1000);
  }

  // Handle player input
  buttons.forEach(btn => {
    btn.addEventListener("click", () => {
      const color = btn.dataset.color;
      playerSequence.push(color);
      flash(color);

      const currentIndex = playerSequence.length - 1;
      if (playerSequence[currentIndex] !== sequence[currentIndex]) {
        statusText.textContent = "❌ Wrong! Game Over!";
        return;
      }

      if (playerSequence.length === sequence.length) {
        setTimeout(nextRound, 1000);
      }
    });
  });

  startBtn.addEventListener("click", startGame);
</script>

</body>
