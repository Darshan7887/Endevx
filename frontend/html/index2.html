<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learn Alphabets</title>
  <style>
    body {
      margin: 0;
      font-family: 'Comic Sans MS', cursive, sans-serif;
      background: linear-gradient(135deg, #FFDEE9 0%, #B5FFFC 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    .character {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      overflow: hidden;
      margin-bottom: 20px;
      border: 5px solid white;
      box-shadow: 0 5px 20px rgba(0,0,0,0.2);
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .alphabet-box {
      font-size: 160px;
      font-weight: bold;
      color: #FF5722;
      background: linear-gradient(145deg, #FFD580, #FF9A8B);
      padding: 40px 80px;
      border-radius: 30px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.3);
      margin-bottom: 30px;
      text-shadow: 4px 4px 6px rgba(0,0,0,0.3);
      animation: popIn 0.6s ease;
      transform: perspective(500px) rotateX(10deg);
    }

    @keyframes popIn {
      0% { transform: scale(0.6) rotateX(50deg); opacity: 0; }
      100% { transform: scale(1) rotateX(10deg); opacity: 1; }
    }

    .btn {
      font-size: 22px;
      padding: 12px 28px;
      border: none;
      border-radius: 15px;
      cursor: pointer;
      background: #4CAF50;
      color: white;
      margin: 8px;
      transition: 0.3s;
      box-shadow: 0 6px 15px rgba(0,0,0,0.2);
    }

    .btn:hover {
      background: #45a049;
      transform: scale(1.05);
    }

    .celebration {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
    }
  </style>
</head>
<body>

  <!-- Character Video -->
  <div class="character">
    <video autoplay muted loop>
      <source src="character.mp4" type="video/mp4">
    </video>
  </div>

  <!-- Alphabet Display -->
  <div class="alphabet-box" id="alphabet">A</div>

  <!-- Controls -->
  <button class="btn" onclick="playAlphabet()">🔊 Listen</button>
  <button class="btn" onclick="startRecognition()">🎤 Speak</button>

  <div class="celebration" id="celebration"></div>

<script>
  const alphabets = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
  let currentIndex = 0;

  // 🎵 Call Flask backend for TTS
  async function playAlphabet() {
    const letter = alphabets[currentIndex];
    try {
      const response = await fetch("http://127.0.0.1:3000/tts", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text: letter })
      });

      if (!response.ok) throw new Error("TTS API failed");

      const blob = await response.blob();
      const audioUrl = URL.createObjectURL(blob);
      const audio = new Audio(audioUrl);
      audio.play();
    } catch (err) {
      console.error("TTS Error:", err);
      alert("Could not play voice. Is Flask server running?");
    }
  }

  // 🎤 Listen to child's pronunciation
  function startRecognition() {
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = "en-US";
    recognition.start();

    recognition.onresult = (event) => {
      const spoken = event.results[0][0].transcript.toUpperCase().trim();
      if (spoken === alphabets[currentIndex]) {
        celebrate();
        nextAlphabet();
      } else {
        alert("Oops! Try again, say: " + alphabets[currentIndex]);
      }
    };
  }

  // 👉 Show next alphabet
  function nextAlphabet() {
    currentIndex++;
    if (currentIndex < alphabets.length) {
      const alphabetBox = document.getElementById("alphabet");
      alphabetBox.textContent = alphabets[currentIndex];
      alphabetBox.style.animation = "popIn 0.6s ease";
      playAlphabet();
    } else {
      alert("🎉 Congratulations! You finished all alphabets!");
    }
  }

  // 🎉 Celebration effect
  function celebrate() {
    const celebration = document.getElementById("celebration");
    const confetti = document.createElement("div");
    confetti.textContent = "🎉";
    confetti.style.position = "absolute";
    confetti.style.left = Math.random() * 100 + "vw";
    confetti.style.top = "-10px";
    confetti.style.fontSize = "2rem";
    confetti.style.animation = "fall 2s linear forwards";
    celebration.appendChild(confetti);

    setTimeout(() => confetti.remove(), 2000);
  }

  // Falling animation
  const style = document.createElement("style");
  style.textContent = `
    @keyframes fall {
      to {
        transform: translateY(100vh);
      }
    }
  `;
  document.head.appendChild(style);

  // Play first alphabet automatically
  window.onload = () => playAlphabet();
</script>
</body>
</html>
