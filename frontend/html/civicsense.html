<!DOCTYPE html>
<html lang="en">
<head>
 <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fugaz+One&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Navbar with Video Previews</title>
  <style>
    body {
      margin: 0;
      font-family: "Fugaz One", sans-serif;
      background: #f6f6f9;
    }

    /* Background video */
    .bg-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
    }

    /* Navbar */
    .navbar {
      background: rgba(75, 42, 173, 0.9);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 20px;
      color: #fff;
      position: relative;
      z-index: 10;
    }

    /* Logo */
    .navbar .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .navbar .logo img {
      width: 40px;
      height: 40px;
      border-radius: 6px;
    }
    .navbar .logo span {
      font-size: 1.2rem;
      font-weight: bold;
    }

    /* Menu */
    .navbar .menu {
      display: flex;
      gap: 25px;
      position: relative;
    }
    .navbar .menu a {
      text-decoration: none;
      color: #fff;
      font-weight: 500;
      font-size: 0.95rem;
      padding: 5px 8px;
      position: relative;
      transition: all 0.3s ease;
    }

    .navbar .menu a:hover {
      color: #ffcc00;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 6px;
      filter: none !important;
    }

    /* Blur other options */
    .navbar .menu:hover a:not(:hover) {
      filter: blur(2px) brightness(70%);
    }

    /* Right side */
    .navbar .right {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    .reward {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.9rem;
    }
    .reward img {
      width: 20px;
      height: 20px;
    }
    .profile img {
      width: 35px;
      height: 35px;
      border-radius: 50%;
      border: 2px solid #fff;
    }

    /* Content */
    .content {
      padding: 40px;
      position: relative;
      z-index: 1;
      color: #fff;
      text-shadow: 0 2px 5px rgba(0,0,0,0.6);
      transition: filter 0.3s ease;
    }
    .menu:hover ~ .content {
      filter: blur(5px);
    }

    /* Video preview */
    .video-preview {
      position: absolute;
      top: 40px;
      left: 0;
      width: 200px;
      height: 120px;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      background: #000;
      z-index: 20;
    }
    .video-preview video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .navbar .menu a:hover .video-preview {
      opacity: 1;
    }
    /* Civic Sense Lesson Styles */
.lesson-box {
  margin: 20px;
  padding: 20px;
  border-radius: 15px;
  background: rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(10px);
  box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  color: white;
  text-align: center;
}

.civic-video-box {
  width: 80%;
  margin: auto;
  margin-bottom: 20px;
  padding: 15px;
  border-radius: 20px;
  background: rgba(0,0,0,0.5);
}

.civic-content button {
  margin: 8px;
  padding: 10px 15px;
  border: none;
  border-radius: 10px;
  background: #4cafef;
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}
.civic-content button:hover {
  background: #0077cc;
}

.score-board {
  margin-top: 15px;
  font-size: 18px;
  font-weight: bold;
}

/* Unlock Notification */
.notification {
  position: fixed;
  bottom: 20px;
  right: -400px;
  background: #4caf50;
  color: white;
  padding: 15px 25px;
  border-radius: 12px;
  font-size: 18px;
  font-weight: bold;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
  transition: right 0.5s ease;
  z-index: 999;
}
.notification.show {
  right: 20px;
}

  </style>
  
</head>
<body>

  <!-- Background video -->
  <video autoplay muted loop playsinline class="bg-video">
    <source src="cycle.mp4" type="video/mp4" />
  </video>

  <!-- Navbar -->
  <div class="navbar">
    <div class="logo">
      <img src="Screenshot 2025-09-14 134929.png">
      <span>BrainBerry</span>
    </div>

    <div class="menu">
      <a href="front.html">
        Home
        <div class="video-preview">
          <video autoplay muted loop playsinline>
            <source src="pix.mp4" type="video/mp4">

        </div>
      </a>
      <a href="challen.html">
        Challenges
        <div class="video-preview">
          <video autoplay muted loop playsinline>

          </video>
        </div>
      </a>
      <a href="chal.html">
        Games
        <div class="video-preview">
          <video autoplay muted loop playsinline>
            <source src="pix3.mp4" type="video/mp4">
          </video>
        </div>
      </a>
      <a href="Less.html">
        Lessons
        <div class="video-preview">
          <video autoplay muted loop playsinline>
            <source src="pix5.mov" type="video/mp4">
          </video>
        </div>
      </a>
      <a href="rewards.html">
        Rewards
        <div class="video-preview">

            <source src="rewards.mp4" type="video/mp4">
          </video>

      </a>
      <a href="help.html">

        <div class="video-preview">

    <div class="right">
      <div class="reward">

        <span>0</span>

  </div>

</div>
<!-- Civic Sense Lesson Section -->
<section id="civic-sense" class="lesson-box">
  <h2>Lesson 2: Civic Sense</h2>

  <!-- Translucent video box -->
  <div class="civic-video-box">
    <video id="civicVideo" width="100%" height="auto" autoplay muted playsinline></video>
  </div>

  <!-- Sentence Display -->
  <div class="civic-content">
    <p id="civicSentence">Click "Start Lesson" to begin!</p>
    <button id="startLesson">▶ Start Lesson</button>
    <button id="playSentence">🔊 Repeat Sentence</button>
    <button id="startMic">🎤 Speak Now</button>
    <button id="nextSentence">➡ Next</button>
  </div>

  <!-- Scoreboard -->
  <div class="score-board">
    <p>Score: <span id="civicScore">0</span> / <span id="civicTotal">0</span></p>
    <p id="civicBadge"></p>
  </div>
</section>

<!-- Notification Popup -->
<div id="unlockNotification" class="notification">
  ✨ New Challenge Unlocked!
</div>

</body>
<script>
    // Civic Sense Lesson Sentences + Videos
const civicLessons = [
  { text: "Don’t throw garbage on the road", video: "kidu.mp4" },
  { text: "Use a dustbin", video: "dust.mp4" },
  { text: "Wash hands before eating", video: "washhand.mp4" },
  { text: "Don’t spit in public", video: "split.mp4" },
  { text: "Don’t play loud music in public places", video: "loudmusic.mp4" },
  { text: "Respect queues", video: "queue.mp4" }
];

let civicIndex = 0;
let civicScore = 0;

const civicVideo = document.getElementById("civicVideo");
const civicSentenceDisplay = document.getElementById("civicSentence");
const civicScoreDisplay = document.getElementById("civicScore");
const civicBadgeDisplay = document.getElementById("civicBadge");
const notification = document.getElementById("unlockNotification");

document.getElementById("civicTotal").innerText = civicLessons.length;

// Start Lesson
document.getElementById("startLesson").addEventListener("click", () => {
  civicIndex = 0;
  civicScore = 0;
  civicScoreDisplay.innerText = 0;
  loadLesson();
});

// Load current lesson video + speak
function loadLesson() {
  if (civicIndex < civicLessons.length) {
    const lesson = civicLessons[civicIndex];
    civicSentenceDisplay.innerText = lesson.text;
    civicVideo.src = lesson.video;
    civicVideo.play();

    // System explains sentence
    const utterance = new SpeechSynthesisUtterance(lesson.text);
    speechSynthesis.speak(utterance);
  } else {
    // Lesson finished
    civicSentenceDisplay.innerText = "🎉 Lesson Complete!";
    triggerCelebration();
  }
}

// Speak sentence manually again
document.getElementById("playSentence").addEventListener("click", () => {
  if (civicIndex < civicLessons.length) {
    const utterance = new SpeechSynthesisUtterance(civicLessons[civicIndex].text);
    speechSynthesis.speak(utterance);
  }
});

// Mic recognition
document.getElementById("startMic").addEventListener("click", () => {
  if (!("webkitSpeechRecognition" in window)) {
    alert("Speech recognition not supported in this browser.");
    return;
  }

  const recognition = new webkitSpeechRecognition();
  recognition.lang = "en-US";
  recognition.start();

  recognition.onresult = (event) => {
    const spoken = event.results[0][0].transcript.toLowerCase();
    const expected = civicLessons[civicIndex].text.toLowerCase();

    if (spoken.includes(expected)) {
      civicScore++;
      civicScoreDisplay.innerText = civicScore;
      civicSentenceDisplay.innerText = "✅ Correct! Click Next.";
    } else {
      civicSentenceDisplay.innerText = "❌ Try Again!";
    }

    if (civicIndex === civicLessons.length - 1 && spoken.includes(expected)) {
      triggerCelebration();
    }
  };
});

// Next Sentence
document.getElementById("nextSentence").addEventListener("click", () => {
  civicIndex++;
  loadLesson();
});

// Celebration + Notification
function triggerCelebration() {
  for (let i = 0; i < 150; i++) createConfetti();
  civicBadgeDisplay.innerText = "🏅 Civic Sense Star Badge Unlocked!";
  notification.classList.add("show");
  setTimeout(() => notification.classList.remove("show"), 4000);
}

// Confetti
function createConfetti() {
  const confetti = document.createElement("div");
  confetti.innerHTML = "🎉";
  confetti.style.position = "fixed";
  confetti.style.left = Math.random() * window.innerWidth + "px";
  confetti.style.top = "-20px";
  confetti.style.fontSize = "24px";
  confetti.style.animation = `fall ${2 + Math.random() * 3}s linear forwards`;
  document.body.appendChild(confetti);
  setTimeout(() => confetti.remove(), 5000);
}

const style = document.createElement("style");
style.innerHTML = `
@keyframes fall {
  to {
    transform: translateY(${window.innerHeight}px);
    opacity: 0;
  }
}`;
document.head.appendChild(style);

</script>
</html>
