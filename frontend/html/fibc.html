<!DOCTYPE html>
<html lang="en">
<head>
 <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fugaz+One&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Navbar with Video Previews</title>
  <style>
    body {
      margin: 0;
      font-family: "Fugaz One", sans-serif;
      background: #f6f6f9;
    }

    /* Background video */
    .bg-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
    }

    /* Navbar */
    .navbar {
      background: rgba(75, 42, 173, 0.9);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 20px;
      color: #fff;
      position: relative;
      z-index: 10;
    }

    /* Logo */
    .navbar .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .navbar .logo img {
      width: 80px;
      height: 55px;
      border-radius: 6px;
    }
    .navbar .logo span {
      font-size: 1.2rem;
      font-weight: bold;
    }

    /* Menu */
    .navbar .menu {
      display: flex;
      gap: 25px;
      position: relative;
    }
    .navbar .menu a {
      text-decoration: none;
      color: #fff;
      font-weight: 500;
      font-size: 0.95rem;
      padding: 5px 8px;
      position: relative;
      transition: all 0.3s ease;
    }

    .navbar .menu a:hover {
      color: #ffcc00;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 6px;
      filter: none !important;
    }

    /* Blur other options */
    .navbar .menu:hover a:not(:hover) {
      filter: blur(2px) brightness(70%);
    }

    /* Right side */
    .navbar .right {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    .reward {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.9rem;
    }
    .reward img {
      width: 20px;
      height: 20px;
    }
    .profile img {
      width: 70px;
      height: 55px;
      border-radius: 50%;
      border: 0px solid #fff;
    }

    /* Content */
    .content {
      padding: 40px;
      position: relative;
      z-index: 1;
      color: #fff;
      text-shadow: 0 2px 5px rgba(0,0,0,0.6);
      transition: filter 0.3s ease;
    }
    .menu:hover ~ .content {
      filter: blur(5px);
    }

    /* Video preview */
    .video-preview {
      position: absolute;
      top: 40px;
      left: 0;
      width: 200px;
      height: 120px;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      background: #000;
      z-index: 20;
    }
    .video-preview video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .navbar .menu a:hover .video-preview {
      opacity: 1;
    }
    /* Navbar */
.navbar {
  background-color: #5a2ec7;
  padding: 10px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.navbar .logo {
  font-weight: bold;
  color: white;
}
.navbar ul {
  list-style: none;
  display: flex;
  gap: 20px;
}
.navbar ul li a {
  color: white;
  text-decoration: none;
  font-weight: bold;
}

/* Translucent Question Box */
#question-box {
  background: rgba(255, 255, 255, 0.85);
  padding: 40px;
  border-radius: 20px;
  text-align: center;
  max-width: 700px;
  margin: 50px auto;
  font-size: 1.5rem;
  box-shadow: 0px 8px 20px rgba(0, 0, 0, 0.15);
  position: relative;
}

/* Feedback */
#feedback {
  margin-top: 15px;
  font-size: 1.2rem;
  font-weight: bold;
}

/* Input */
#answerInput {
  margin: 15px 0;
  padding: 10px;
  width: 60%;
  font-size: 1rem;
  border: 2px solid #555;
  border-radius: 8px;
}

/* Buttons */
button {
  margin: 8px;
  padding: 12px 20px;
  border: none;
  border-radius: 10px;
  background-color: #5a2ec7;
  color: white;
  cursor: pointer;
  font-size: 1rem;
  transition: 0.2s;
}
button:hover {
  background-color: #3a1991;
}

/* Mic & Speaker icons */
.icon {
  font-size: 28px;
  margin: 0 10px;
  display: inline-block;
  vertical-align: middle;
  cursor: pointer;
  opacity: 0.4;
  transition: 0.2s;
}
.icon:hover {
  transform: scale(1.1);
}
#speakIcon {
  color: #007bff; /* Blue */
}
#micIcon {
  color: #28a745; /* Green */
}

/* Badge */
#badge {
  display: none;
  margin-top: 20px;
  font-size: 1.5rem;
  color: gold;
  text-shadow: 1px 1px 4px black;
}
#badge.show {
  display: block;
}

  </style>
  
</head>

    <div class="right">

  </div>
  <div id="question-box">

    <!-- Icons -->
    <div id="icons">
      <span id="speakIcon" class="icon">🔊</span>
      <span id="micIcon" class="icon">🎤</span>
    </div>

    <input type="text" id="answerInput" placeholder="Speak or type your answer here">
    <p id="score">Score: 0/20</p>
    <button id="startBtn">Start Lesson</button>

  </div>

  <script src="fibc.js"></script>
</body>
