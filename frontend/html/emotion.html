<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fugaz+One&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Emotion Detector</title>
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <style>
        body {
            margin: 0;
            font-family: "Fugaz one", sans-serif;
            background: #f6f6f9;
        }

        /* Background video */
        .bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }

        /* Navbar */
        .navbar {
            background: rgba(75, 42, 173, 0.9);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 20px;
            color: #fff;
            position: relative;
            z-index: 10;
        }

        /* Logo */
        .navbar .logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .navbar .logo img {
            width: 80px;
            height: 55px;
            border-radius: 6px;
        }
        .navbar .logo span {
            font-size: 1.2rem;
            font-weight: bold;
        }

        /* Menu */
        .navbar .menu {
            display: flex;
            gap: 25px;
            position: relative;
        }
        .navbar .menu a {
            text-decoration: none;
            color: #fff;
            font-weight: 500;
            font-size: 0.95rem;
            padding: 5px 8px;
            position: relative;
            transition: all 0.3s ease;
        }

        .navbar .menu a:hover {
            color: #ffcc00;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 6px;
            filter: none !important;
        }

        /* Blur other options */
        .navbar .menu:hover a:not(:hover) {
            filter: blur(2px) brightness(70%);
        }

        /* Right side */
        .navbar .right {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .reward {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.9rem;
        }
        .reward img {
            width: 20px;
            height: 20px;
        }
        .profile img {
            width: 70px;
            height: 55px;
            border-radius: 50%;
            border: 0px solid #fff;
        }

        /* Content */
        .content {
            padding: 40px;
            position: relative;
            z-index: 1;
            color: #fff;
            text-shadow: 0 2px 5px rgba(0,0,0,0.6);
            transition: filter 0.3s ease;
        }
        .menu:hover ~ .content {
            filter: blur(5px);
        }

        /* Video preview */
        .video-preview {
            position: absolute;
            top: 40px;
            left: 0;
            width: 200px;
            height: 120px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            background: #000;
            z-index: 20;
        }
        .video-preview video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .navbar .menu a:hover .video-preview {
            opacity: 1;
        }

        /* Emotion Detector Styles */
        .emotion-detector-container {
            width: 100%;
            max-width: 800px;
            margin: 2rem auto;
            background: rgba(42, 42, 74, 0.8);
            border-radius: 1.5rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            padding: 2rem;
            text-align: center;
            color: #e0e0e0;
        }

        .emotion-detector-title {
            color: #925dff;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .emotion-detector-subtitle {
            font-size: 1rem;
            color: #b3b3b3;
            margin-bottom: 2rem;
        }
        
        .video-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 2rem;
        }

        #webcam-container {
            position: relative;
            border-radius: 1rem;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            background-color: #000;
        }
        #video, #character-video {
            width: 100%;
            height: auto;
            border-radius: 1rem;
        }

        #overlay-canvas {
            position: absolute;
            top: 0;
            left: 0;
        }
        
        .status-box {
            background: rgba(30, 30, 63, 0.8);
            color: #dcdcdc;
            padding: 1rem;
            margin-top: 2rem;
            border-radius: 1rem;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2);
            min-height: 4rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Fugaz one", sans-serif;
        }

        .emotion-display {
            font-size: 1.5rem;
            font-weight: 600;
            color: #ffffff;
            letter-spacing: 1px;
        }

        .loading-text {
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }
    </style>
</head>
<body>

    <!-- Background video -->
    <video autoplay muted loop playsinline class="bg-video">
        <source src="waterfall-pixel-moewalls-com.mp4" type="video/mp4" />
    </video>

    <!-- Navbar -->
    <div class="navbar">
        <div class="logo">
            <img src="Screenshot 2025-09-14 134929.png" alt="#">
            <span>BrainBerry</span>
        </div>

        <div class="menu">
            <a href="front.html">
                Home
                <div class="video-preview">
                    <video autoplay muted loop playsinline>
                        <source src="pix.mp4" type="video/mp4">
                    </video>
                </div>
            </a>
            <a href="challen.html">
                Challenges
                <div class="video-preview">
                    <video autoplay muted loop playsinline>
                        <source src="pix2.mp4" type="video/mp4">
                    </video>
                </div>
            </a>
            <a href="chal.html">
                Games
                <div class="video-preview">
                    <video autoplay muted loop playsinline>
                        <source src="pix3.mp4" type="video/mp4">
                    </video>
                </div>
            </a>
            <a href="Less.html">
                Lessons
                <div class="video-preview">
                    <video autoplay muted loop playsinline>
                        <source src="pix5.mov" type="video/mp4">
                    </video>
                </div>
            </a>
            <a href="rewards.html">
                Rewards
                <div class="video-preview">
                    <video autoplay muted loop playsinline>
                        <source src="reward.mp4" type="video/mp4">
                    </video>
                </div>
            </a>
            <a href="help.html">
                Help
                <div class="video-preview">
                    <video autoplay muted loop playsinline>
                        <source src="help.mp4" type="video/mp4">
                    </video>
                </div>
            </a>
        </div>

        <div class="right">
            <div class="reward">
                <img src="https://cdn-icons-png.flaticon.com/512/616/616490.png" alt="Gem">
                <span>0</span>
            </div>
            <div class="reward">
                <img src="https://cdn-icons-png.flaticon.com/512/138/138281.png" alt="Coin">
                <span>0</span>
            </div>
            <div class="profile">
                <img src="dp-cactus-20.png" alt="User">
            </div>
        </div>
    </div>

    <!-- Emotion Detector Section -->
    <div class="emotion-detector-container">
        <h1 class="emotion-detector-title">Call with Lina</h1>
        <p class="emotion-detector-subtitle">Your emotions, reflected by a character.</p>

        <div class="video-wrapper">
            <div id="webcam-container" class="relative rounded-2xl overflow-hidden shadow-lg w-1/2">
                <video id="webcam-video" width="320" height="240" autoplay muted class="rounded-2xl"></video>
                <canvas id="overlay-canvas" class="absolute top-0 left-0"></canvas>
            </div>
            <div id="character-video-container" class="w-1/2">
                <video id="character-video" width="320" height="240" autoplay muted loop playsinline class="rounded-2xl"></video>
            </div>
        </div>

        <div id="status-box" class="status-box">
            <p id="status-text" class="text-xl text-gray-300 loading-text">Loading models...</p>
        </div>
    </div>

    <script>
        const webcamVideo = document.getElementById('webcam-video');
        const characterVideo = document.getElementById('character-video');
        const canvas = document.getElementById('overlay-canvas');
        const statusText = document.getElementById('status-text');
        const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
        
        const characterVideoUrl = 'fitgirl.mp4';
        
        let lastVideoUrl = '';

        // Helper function for a custom message box instead of alert()
        function showMessage(message) {
            statusText.textContent = message;
        }

        // Set up the webcam stream
        async function startWebcam() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                webcamVideo.srcObject = stream;
            } catch (err) {
                showMessage(`Error accessing webcam: ${err.message}. Please allow camera access.`);
                console.error(err);
            }
        }

        // Load the face detection and expression models
        async function loadModels() {
            showMessage("Loading models...");
            try {
                await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
                await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
                await faceapi.nets.faceExpressionNet.loadFromUri(MODEL_URL);
                showMessage("Models loaded successfully. Starting detection...");
            } catch (error) {
                showMessage("Failed to load models. Please check your internet connection.");
                console.error(error);
            }
        }

        // Main function to run the detection loop
        async function runDetection() {
            const displaySize = { width: webcamVideo.width, height: webcamVideo.height };
            faceapi.matchDimensions(canvas, displaySize);
            
            // Set character video source to the provided file and play
            characterVideo.src = characterVideoUrl;
            characterVideo.play();
            lastVideoUrl = characterVideoUrl;

            // Continuously detect faces and expressions every 100ms
            setInterval(async () => {
                const detections = await faceapi.detectAllFaces(webcamVideo, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceExpressions();

                if (detections && detections.length > 0) {
                    const resizedDetections = faceapi.resizeResults(detections, displaySize);
                    
                    // Clear canvas before drawing
                    canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
                    
                    // Draw bounding boxes
                    faceapi.draw.drawDetections(canvas, resizedDetections);
                    
                    resizedDetections.forEach(detection => {
                        const box = detection.detection.box;
                        const expressions = detection.expressions;
                        const sortedExpressions = Object.keys(expressions).sort((a, b) => expressions[b] - expressions[a]);
                        const dominantEmotion = sortedExpressions[0];
                        const dominantScore = expressions[dominantEmotion];

                        // Display the dominant emotion
                        const text = `${dominantEmotion.charAt(0).toUpperCase() + dominantEmotion.slice(1)} (${Math.round(dominantScore * 100)}%)`;
                        statusText.textContent = `You look: ${text}`;
                        
                        // Draw emotion text on the canvas
                        const drawBox = new faceapi.draw.DrawBox(box, { label: text, boxColor: '#925dff', lineWidth: 2 });
                        drawBox.draw(canvas);
                    });

                } else {
                    // No face detected
                    statusText.textContent = "Waiting for face...";
                    canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
                }
            }, 100);
        }

        // Start the application on video load
        webcamVideo.addEventListener('loadeddata', () => {
            runDetection();
        });

        // Run the setup when the page loads
        window.onload = async () => {
            await loadModels();
            startWebcam();
        };
    </script>
</body>
</html>
