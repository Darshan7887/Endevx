<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Funnel+Display:wght@300..800&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Navbar with Video Previews</title>
  <style>
    body {
      margin: 0;
      font-family: "Funnel Display", sans-serif;
      background: #f6f6f9;
    }

    /* Background video */
    .bg-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
    }

    /* Navbar */
    .navbar {
      background: rgba(75, 42, 173, 0.9);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 20px;
      color: #fff;
      position: relative;
      z-index: 10;
    }

    /* Logo */
    .navbar .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .navbar .logo img {
      width: 40px;
      height: 40px;
      border-radius: 6px;
    }
    .navbar .logo span {
      font-size: 1.2rem;
      font-weight: bold;
    }

    /* Menu */
    .navbar .menu {
      display: flex;
      gap: 25px;
      position: relative;
    }
    .navbar .menu a {
      text-decoration: none;
      color: #fff;
      font-weight: 500;
      font-size: 0.95rem;
      padding: 5px 8px;
      position: relative;
      transition: all 0.3s ease;
    }

    .navbar .menu a:hover {
      color: #ffcc00;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 6px;
      filter: none !important;
    }

    /* Blur other options */
    .navbar .menu:hover a:not(:hover) {
      filter: blur(2px) brightness(70%);
    }

    /* Right side */
    .navbar .right {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    .reward {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.9rem;
    }
    .reward img {
      width: 20px;
      height: 20px;
    }
    .profile img {
      width: 35px;
      height: 35px;
      border-radius: 50%;
      border: 2px solid #fff;
    }

    /* Content */
    .content {
      padding: 40px;
      position: relative;
      z-index: 1;
      color: #fff;
      text-shadow: 0 2px 5px rgba(0,0,0,0.6);
      transition: filter 0.3s ease;
    }
    .menu:hover ~ .content {
      filter: blur(5px);
    }

    /* Video preview */
    .video-preview {
      position: absolute;
      top: 40px;
      left: 0;
      width: 200px;
      height: 120px;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      background: #000;
      z-index: 20;
    }
    .video-preview video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .navbar .menu a:hover .video-preview {
      opacity: 1;
    }
  </style>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Background video -->
  <video autoplay muted loop playsinline class="bg-video">
    <source src="pix.mp4" type="video/mp4" />
  </video>

  <!-- Navbar -->
  <div class="navbar">
    <div class="logo">
      <img src="https://via.placeholder.com/40x40.png?text=L" alt="Logo">
      <span>MyApp</span>
    </div>

    <div class="menu">
      <a href="#">
        Home
        <div class="video-preview">
          <video autoplay muted loop playsinline>
            <source src="pix.mp4" type="video/mp4">
          </video>
        </div>
      </a>
      <a href="#">
        Challenges
        <div class="video-preview">
          <video autoplay muted loop playsinline>
            <source src="pix12.mp4" type="video/mp4">
          </video>
        </div>
      </a>
      <a href="#">
        Games
        <div class="video-preview">
          <video autoplay muted loop playsinline>
            <source src="pix3.mp4" type="video/mp4">
          </video>
        </div>
      </a>
      <a href="#">
        Lessons
        <div class="video-preview">
          <video autoplay muted loop playsinline>
            <source src="pix5.mov" type="video/mp4">
          </video>
        </div>
      </a>
      <a href="#">
        Rewards
        <div class="video-preview">
          <video autoplay muted loop playsinline>
            <source src="rewards.mp4" type="video/mp4">
          </video>
        </div>
      </a>
      <a href="help.html">
        Help
        <div class="video-preview">
          <video autoplay muted loop playsinline>
            <source src="help.mp4" type="video/mp4">
          </video>
        </div>
      </a>
    </div>

    <div class="right">
      <div class="reward">
        <img src="https://cdn-icons-png.flaticon.com/512/616/616490.png" alt="Gem">
        <span>0</span>
      </div>
      <div class="reward">
        <img src="https://cdn-icons-png.flaticon.com/512/138/138281.png" alt="Coin">
        <span>0</span>
      </div>
      <div class="profile">
        <img src="https://via.placeholder.com/40x40.png?text=U" alt="User">
      </div>
    </div>
  </div>

</body>
</html>
